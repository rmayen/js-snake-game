<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2em;
            color: #4caf50;
        }
        .score-board {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .score-board span {
            color: #4caf50;
            font-weight: bold;
        }
        #gameCanvas {
            border: 2px solid #4caf50;
            background-color: #f5f5f5;
            border-radius: 4px;
        }
        .controls {
            margin-top: 15px;
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>Snake Game</h1>
    <div class="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>High Score: <span id="high-score">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p class="controls">Use arrow keys to move | Space to restart</p>
    <script src="script.js"></script>
</body>
</html>
